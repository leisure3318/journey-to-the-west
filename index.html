<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>西天取经</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='15' fill='%23b8860b'/><circle cx='16' cy='16' r='13' fill='%23ffd700'/><text x='16' y='22' font-size='18' font-weight='bold' fill='%238b0000' text-anchor='middle' font-family='serif'>西</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
    body { display: flex; justify-content: center; align-items: center; }
    canvas { display: block; max-width: 100%; max-height: 100%; }
    #rotate-hint {
      display: none; position: fixed; inset: 0; z-index: 99999;
      background: rgba(0,0,0,0.92); color: #ffdd44;
      font: bold 24px sans-serif; text-align: center;
      flex-direction: column; justify-content: center; align-items: center; gap: 20px;
    }
    #rotate-hint .icon { font-size: 60px; animation: spin 2s ease-in-out infinite; }
    @keyframes spin { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(90deg)} }
    @media screen and (orientation: portrait) and (max-width: 900px) {
      #rotate-hint { display: flex; }
    }
  </style>
</head>
<body>
  <div id="rotate-hint">
    <div class="icon">📱</div>
    <div>请横屏游玩</div>
    <div style="font-size:14px;color:#999">Rotate your device to landscape</div>
  </div>
  <script type="module" src="src/main.ts"></script>
</body>
</html>
